<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Drone Relay Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
  <main class="container" style="max-width:440px;padding-top:60px;">
    <section class="card">
      <h2>Drone Relay Login</h2>
      {% if error %}
      <div class="notice" style="color:var(--danger);">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="form-row"><label>Username</label><input name="username" autocomplete="username"></div>
        <div class="form-row"><label>Password</label><input name="password" type="password" autocomplete="current-password"></div>
        <button class="btn primary" type="submit" style="margin-top:12px;">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
